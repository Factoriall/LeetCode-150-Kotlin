cat <<EOF > .github/workflows/update-readme.yml
name: Update README Statistics

on:
  push:
    branches: [ main ]
    paths:
      - 'src/leetcode/Top150/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate & Update
        run: |
          COMPLETED=\$(find src/leetcode/Top150 -maxdepth 1 -type d -name "Q*" | wc -l | xargs)
          PERCENT=\$(( COMPLETED * 100 / 150 ))
          FILLED=\$(( PERCENT / 10 ))
          EMPTY=\$(( 10 - FILLED ))
          BAR=\$(printf '▓%.0s' \$(seq 1 \$FILLED 2>/dev/null || true))\$(printf '░%.0s' \$(seq 1 \$EMPTY 2>/dev/null || true))
          
          # @를 구분자로 써서 더 공격적으로 패턴 매칭
          sed -i "s@Status:.*@Status: \$COMPLETED / 150 (\$PERCENT%)@g" README.md
          sed -i "s@진행률:.*@진행률: [\$BAR] \$COMPLETED / 150 (\$PERCENT%)@g" README.md

      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: force update progress [skip ci]"
            git push
          fi
EOF