name: Update README Statistics

on:
  push:
    branches: [ main ]
    paths:
      - 'src/leetcode/Top150/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Statistics & Update README
        run: |
          # 1. 문제 개수 계산 (Q로 시작하는 폴더 개수)
          COMPLETED=$(find src/leetcode/Top150 -maxdepth 1 -type d -name "Q*" | wc -l | xargs)
          TOTAL=150
          PERCENT=$(( COMPLETED * 100 / TOTAL ))
          
          # 2. 프로그레스 바 생성 (10칸 기준)
          FILLED=$(( PERCENT / 10 ))
          EMPTY=$(( 10 - FILLED ))
          BAR=$(printf '▓%.0s' $(seq 1 $FILLED 2>/dev/null || true))$(printf '░%.0s' $(seq 1 $EMPTY 2>/dev/null || true))
          
          # 3. README 업데이트 (Status 및 진행률 줄 찾?s:\*\*.*/- **Status:** $COMPLETED \/ $TOTAL ($PERCENT%)/g" README.md
          sed -i "s/- \*\*진행률:\*\*.*/- **진행률:** [$BAR] $COMPLETED \/ $TOTAL ($PERCENT%)/g" README.md

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # 변경사항이 있을 때만 커밋 및 푸시
          if ! git diff --staged --quiet; then
            git commit -m "chore: update README statistics [skip ci]"
            git push
          fi
